# Ruff configuration for the repository
# https://docs.astral.sh/ruff/configuration/

target-version = "py310"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "W",   # pycodestyle warnings
]
ignore = [
    "E501", # line too long (handled by ruff format)
]

[format]
quote-style = "double"
